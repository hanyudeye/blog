name: Update Submodules

on:
  # 每天定时检查一次子模块更新（保险机制）
  schedule:
    - cron: '0 */6 * * *'  # 每 6 小时检查一次
  
  # 允许手动触发
  workflow_dispatch:
  
  # 从 content 仓库触发的 repository_dispatch 事件
  repository_dispatch:
    types: [content_updated]

permissions:
  contents: write
  pull-requests: write
  actions: write  # 需要此权限才能触发其他工作流

jobs:
  update-submodules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repository
        uses: actions/checkout@v4
        with:
          submodules: false
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          # 配置 pull 策略为 rebase，保持历史整洁
          git config --global pull.rebase false

      - name: Pull latest changes
        run: |
          git pull origin master || echo "No changes to pull"

      - name: Convert submodule URLs from SSH to HTTPS
        run: |
          # 将 SSH URL 转换为 HTTPS URL，以便使用 token 认证
          git config --file=.gitmodules submodule.content.url https://github.com/hanyudeye/thinking.git
          # 同步到 .git/config
          git submodule sync
          
          # 配置 git 使用 token 进行 HTTPS 认证（使用 credential helper）
          echo "https://${{ secrets.GITHUB_TOKEN }}@github.com" > $HOME/.git-credentials
          git config --global credential.helper store
          git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Update content submodule
        run: |
          # 如果子模块已存在但使用旧 URL，先清理
          if [ -d "content/.git" ]; then
            rm -rf content
          fi
          # 使用 HTTPS URL 和 token 更新子模块
          git submodule update --init --remote --force content

      - name: Check for changes
        id: verify-changed-files
        run: |
          if git diff --quiet HEAD; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected:"
            git diff --name-only HEAD
            git status
          fi

      - name: Commit and push changes
        if: steps.verify-changed-files.outputs.changed == 'true'
        run: |
          # 在提交前再次拉取，确保基于最新代码
          git pull origin master || echo "Pull failed, continuing anyway"
          git add content
          # 移除 [skip ci] 以允许触发 hugo.yml 工作流
          git commit -m "chore: update submodules"
          # 尝试推送，如果失败则拉取并重试
          if ! git push origin master; then
            echo "Push failed, pulling latest changes and retrying..."
            git pull origin master --no-edit || git pull origin master --no-rebase --no-edit
            git push origin master
          fi
        continue-on-error: true

      - name: Trigger Hugo build via API (fallback)
        if: steps.verify-changed-files.outputs.changed == 'true'
        run: |
          # 使用 API 触发作为备用方案（push 事件应该会自动触发）
          response=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/hugo.yml/dispatches \
            -d '{"ref":"master"}')
          
          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | sed '$d')
          
          if [ "$http_code" -eq 204 ]; then
            echo "Successfully triggered Hugo build workflow via API"
          else
            echo "API trigger returned HTTP $http_code"
            echo "Response: $body"
            echo "Note: Hugo workflow should still be triggered by the push event"
          fi
