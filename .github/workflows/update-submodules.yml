name: Update Submodules

on:
  # 每天定时检查一次子模块更新（保险机制）
  schedule:
    - cron: '0 */6 * * *'  # 每 6 小时检查一次
  
  # 允许手动触发
  workflow_dispatch:
  
  # 从 content 仓库触发的 repository_dispatch 事件
  repository_dispatch:
    types: [content_updated]

permissions:
  contents: write
  pull-requests: write

jobs:
  update-submodules:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repository
        uses: actions/checkout@v4
        with:
          submodules: false
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Configure git
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"

      - name: Convert submodule URLs from SSH to HTTPS
        run: |
          # 将 SSH URL 转换为 HTTPS URL，以便使用 token 认证
          git config --file=.gitmodules submodule.content.url https://github.com/hanyudeye/thinking.git
          # 同步到 .git/config
          git submodule sync
          
          # 配置 git 使用 token 进行 HTTPS 认证（使用 credential helper）
          echo "https://${{ secrets.GITHUB_TOKEN }}@github.com" > $HOME/.git-credentials
          git config --global credential.helper store
          git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Update content submodule
        run: |
          # 如果子模块已存在但使用旧 URL，先清理
          if [ -d "content/.git" ]; then
            rm -rf content
          fi
          # 使用 HTTPS URL 和 token 更新子模块
          git submodule update --init --remote --force content

      - name: Check for changes
        id: verify-changed-files
        run: |
          if git diff --quiet HEAD; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected:"
            git diff --name-only HEAD
            git status
          fi

      - name: Commit and push changes
        if: steps.verify-changed-files.outputs.changed == 'true'
        run: |
          git add content
          git commit -m "chore: update submodules [skip ci]"
          git push origin master
        continue-on-error: true

      - name: Trigger Hugo build
        if: steps.verify-changed-files.outputs.changed == 'true'
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/actions/workflows/hugo.yml/dispatches \
            -d '{"ref":"master"}'
